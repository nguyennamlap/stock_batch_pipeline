

x-airflow-common: &airflow-common
  # Giả sử có Dockerfile trong thư mục này
  image: apache/airflow:2.7.1  # Dùng image chuẩn của hãng
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres/${DB_NAME}
    - AIRFLOW_ADMIN_USER=${AIRFLOW_ADMIN_USER:-admin}
    - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
    - AIRFLOW_ADMIN_EMAIL=${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY:-$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")}
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/opt/airflow/logs
    # - AIRFLOW_CONN_POSTGRES_STOCK=postgresql://my_user:my_password@my_host:5432/my_database
    - AIRFLOW_CONN_POSTGRES_STOCK=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/vn_stock_db
    - HOST_PROJECT_DIR=${HOST_PROJECT_DIR}
    - PYTHONPATH=/opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    # - ./plugins:/opt/airflow/plugins
    - /var/run/docker.sock:/var/run/docker.sock   # Mount lại socket

  user: "${AIRFLOW_UID:-50000}:${DOCKER_GID:-0}"  
  networks:
    - stock_network
  depends_on:
    postgres:
      condition: service_healthy # Chỉ start khi postgres đã sẵn sàng

services:
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      - POSTGRES_USER=${DB_USER:-admin}  
      - POSTGRES_PASSWORD=${DB_PASSWORD:-airflow}
      - POSTGRES_DB=${DB_NAME:-airflow}
      # Không dùng biến ảo, thay bằng script init
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script tạo thêm database stock_db khi container khởi tạo lần đầu
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - stock_network
    healthcheck:   # Kiểm tra PostgreSQL sẵn sàng nhận kết nối
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-airflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Service khởi tạo database Airflow và tạo user admin (chạy 1 lần)
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    volumes:
      - ./scripts:/scripts  # Mount thư mục chứa script
    command: /scripts/init-airflow.sh
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    container_name: airflow_webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully   # Đợi init xong mới start

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    container_name: airflow_scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully 

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}   
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}        
    ports:
      - "5050:80"               
    volumes:
      - pgadmin_data:/var/lib/pgadmin   
    networks:
      - stock_network

networks:
  stock_network:
    name: stock_network  # Dòng này sẽ chặn việc Docker tự thêm tiền tố
    driver: bridge
    
volumes:
  postgres_data:
  pgadmin_data: